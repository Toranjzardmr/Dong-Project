{% extends 'core/base.html' %}
{% load crispy_forms_tags %}

{% block title %} {{ group.name }} - Edit {% endblock %}

{% block body %}

<div class="container py-5">

    <div class="row justify-content-center">
        <div class="col-lg-8 col-xl-7">

            <div class="text-center mb-5">
                <h1 class="h2 fw-bold">
                    <i class="bi bi-plus-circle-fill me-3 text-primary">Edit Group</i>
                </h1>
                <p class="text-secondary lead"> Create your group and share expenses with your friends</p>
            </div>

            <div class="card border-secondary shadow-lg">
                <div class="card-body p-4 p-md-5">

                    <form method="post" novalidate>
                        {% csrf_token %}

                        {{ form|crispy }}

                        <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill shadow mt-3">
                            <i class="bi bi-check2-circle me-2">Update</i>
                        </button>
                    </form>

                </div>
            </div>

            <a href="{% url 'core:group_delete' group.id %}" class="btn btn-danger btn-lg w-100 rounded-pill shadow mt-3">Delete Group</a>

            <div class="text-center mt-4">
                <a href="{% url 'core:home' %}" class="text-secondary text-decoration-none">
                    <i class="bi bi-arrow-left me-2">Back to MyGroups</i>
                </a>
            </div>

        </div>
    </div>

</div>

{% endblock %}
